route:
  receiver: slack-notifications
  group_by: ["alertname"]
  group_wait: 10s
  group_interval: 10s
  repeat_interval: 1h

receivers:
  - name: slack-notifications
    slack_configs:
      - api_url: "__SLACK_WEBHOOK_URL__"
        channel: "#mlops-alerts"
        send_resolved: true
        title: "[{{ .Status | toUpper }}] {{ .CommonLabels.alertname }}"
        text: "{{ range .Alerts }}{{ .Annotations.description }}{{ end }}"
