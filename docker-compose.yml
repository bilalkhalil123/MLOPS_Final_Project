services:
  alertmanager:
    image: prom/alertmanager:latest
    ports:
      - "9093:9093"
    env_file:
      - .env
    volumes:
      - ./docker:/configs:ro
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        sed "s|__SLACK_WEBHOOK_URL__|$$SLACK_WEBHOOK_URL|g" /configs/alertmanager.template.yml > /tmp/alertmanager.yml
        exec /bin/alertmanager --config.file=/tmp/alertmanager.yml --storage.path=/tmp/alertmanager

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./docker:/configs:ro
    command:
      - "--config.file=/configs/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-lifecycle"
    depends_on:
      - alertmanager

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/etc/grafana/dashboards:ro
    depends_on:
      - prometheus

volumes:
  grafana_data:
